spring.application.name=report-service
server.port=8091

# Database Configuration - SQLite (Development)
spring.datasource.url=jdbc:sqlite:db/report_service.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Internal microservice dependency
services.user-service.url=http://localhost:8090
