server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8080"
              - "http://127.0.0.1:8080"
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/auth/**
        - id: report-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/reports/**

jwt:
  secret: SOSMascotasChileSecretKeyFor256BitHMACEncryptionBase64EncodedValue1234567890AB
